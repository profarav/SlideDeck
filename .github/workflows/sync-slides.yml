name: Sync Slides

on:
  # Run every night at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'
  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit back vision_index.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet \
            anthropic \
            Pillow \
            python-dotenv \
            google-api-python-client \
            google-auth

      - name: Sync new slides from Google Slides
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SLIDES_ID: ${{ secrets.GOOGLE_SLIDES_ID }}
        run: python sync.py

      - name: Commit updated index and new slide images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vision_index.json slides_png/
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "Auto-sync: $(date -u '+%Y-%m-%d') — update slide index [skip ci]"
          git push
